<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIDI Foot Controller</title>
<style>
  :root {
    --bg: #0a0a0a; --panel: #161616; --panel2: #1f1f1f; --border: #2c2c2c;
    --text: #f2f2f2; --dim: #8a8a8a; --accent: #00cc88; --err: #ff5566;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
    min-width: 1000px;
  }
  header { display: flex; align-items: baseline; gap: 12px; padding: 16px 24px 0; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 13px; }
  #status { margin-left: auto; font-size: 13px; color: var(--dim); transition: color .2s; }
  #status.ok { color: var(--accent); }
  #status.err { color: var(--err); }
  nav { display: flex; gap: 6px; padding: 14px 24px 0; }
  nav button {
    background: var(--panel); color: var(--dim); border: 1px solid var(--border);
    border-bottom: none; border-radius: 8px 8px 0 0; padding: 9px 22px;
    font-size: 14px; cursor: pointer;
  }
  nav button.active { background: var(--panel2); color: var(--text); font-weight: 600; }
  main {
    margin: 0 24px 24px; padding: 16px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 0 8px 8px 8px;
  }
  .hint { color: var(--dim); font-size: 12px; margin: 0 2px 12px; }

  /* ---- overview ---- */
  .ov-menu { margin-bottom: 20px; }
  .ov-menu h2 { font-size: 14px; margin: 0 0 8px; color: var(--dim); }
  .ov-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .cell {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 11px 11px; display: flex; flex-direction: column; gap: 3px;
    cursor: pointer; min-height: 86px; user-select: none;
  }
  .cell:hover { border-color: var(--accent); }
  .cell .head { display: flex; align-items: center; gap: 8px; }
  .cell .num { font-size: 12px; color: var(--dim); font-weight: 600; }
  .cell .swatches { display: flex; gap: 5px; margin-left: auto; }
  .cell .sw {
    width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--border);
  }
  .cell .label { font-size: 15px; font-weight: 600; min-height: 20px; }
  .cell .meta { font-size: 12px; color: var(--dim); }
  .cell .hold { font-size: 12px; color: var(--dim); font-style: italic; }
  .cell.shift {
    justify-content: center; align-items: center; color: var(--dim);
    border-style: dashed; cursor: default;
  }
  .cell.shift:hover { border-color: var(--border); }

  /* ---- menu editor cards, physical 5x2 layout ---- */
  .cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 12px 14px; cursor: pointer;
  }
  .card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .card.shift {
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); border-style: dashed; cursor: default; min-height: 120px;
  }
  .card h3 {
    margin: 0 0 10px; font-size: 13px; color: var(--dim); font-weight: 600;
    display: flex; align-items: center; gap: 8px; user-select: none;
  }
  .card h3 .sec-tag { color: var(--accent); font-weight: 400; margin-left: auto; font-size: 11px; }
  .card .divider { border-top: 1px solid var(--border); margin: 12px -12px; }
  .card h4 {
    margin: 0 0 8px; font-size: 11px; color: var(--dim);
    text-transform: uppercase; letter-spacing: .05em; user-select: none;
  }
  .field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
  .field label { font-size: 11px; color: var(--dim); }
  .field input[type=text], .field input[type=number], .field select {
    background: #0f0f0f; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 7px; font-size: 13px; width: 100%;
  }
  .field input[type=color] { width: 100%; height: 28px; padding: 2px; background: #0f0f0f;
    border: 1px solid var(--border); border-radius: 6px; }
  .field input:focus, .field select:focus { outline: 1px solid var(--accent); }
  .check { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; font-size: 12px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .btn {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .btn.danger { color: var(--err); border-color: var(--err); }

  /* ---- global settings tab ---- */
  .global { display: grid; grid-template-columns: repeat(3, minmax(240px, 340px)); gap: 24px; }
  .global h2 {
    font-size: 13px; margin: 0 0 12px; color: var(--dim);
    text-transform: uppercase; letter-spacing: .06em;
  }
  .global .field label { font-size: 12px; }
  .global .field input, .global .field select { font-size: 14px; padding: 7px 9px; }
  #statusbox { font-size: 13px; color: var(--dim); display: flex; flex-direction: column; gap: 6px; }
  #statusbox b { color: var(--text); font-weight: 600; }
  .expbar { height: 8px; background: #0f0f0f; border-radius: 4px; overflow: hidden; }
  .expbar > div { height: 100%; background: var(--accent); width: 0; transition: width .3s; }
</style>
</head>
<body>
<header>
  <h1>MIDI Foot Controller</h1>
  <span class="sub">configuration</span>
  <span id="status"></span>
</header>
<nav id="tabs"></nav>
<main>
  <div id="view-overview" hidden></div>
  <div id="view-menu" hidden>
    <div class="hint">Click a panel to select it, shift-click to select several —
      a change to one selected button applies to all of them (labels excluded).
      All changes save immediately.</div>
    <div class="cards" id="cards"></div>
  </div>
  <div id="view-global" hidden>
    <div class="global">
      <div>
        <h2>Hold Settings</h2>
        <div class="field">
          <label>Shift hold — Menu 4 (seconds)</label>
          <input type="number" id="set-shift" min="0.5" max="10" step="0.1">
        </div>
        <div class="field">
          <label>Default secondary hold (seconds)</label>
          <input type="number" id="set-hold" min="0.2" max="10" step="0.1">
        </div>
      </div>
      <div>
        <h2>MIDI</h2>
        <div class="field">
          <label>Program numbers start at</label>
          <select id="set-pcbase">
            <option value="0">0 (raw MIDI)</option>
            <option value="1">1 (MainStage-style)</option>
          </select>
        </div>
        <h2 style="margin-top:24px">Expression Panel</h2>
        <div class="field">
          <label>Panel width: <span id="set-width-val"></span>% of screen</label>
          <input type="range" id="set-width" min="5" max="30" step="1">
        </div>
      </div>
      <div>
        <h2>Live Status</h2>
        <div id="statusbox">connecting…</div>
      </div>
    </div>
  </div>
</main>

<script>
const TYPE_NAMES = {
  effect_cc: "Effect CC", action_cc: "Action CC", program_change: "Program Change",
  expression_pedal: "Expression Pedal", nothing: "Nothing",
};
const PRIMARY_TYPES = ["effect_cc", "action_cc", "program_change", "expression_pedal", "nothing"];
const SECONDARY_TYPES = ["effect_cc", "action_cc", "program_change", "expression_pedal"];
// Color model: primaries have off_color + on_color; secondaries on_color only.
const TEMPLATES = {
  effect_cc: { type: "effect_cc", midi_channel: 1, cc_number: 20,
    off_color: "#303030", on_color: "#00FF66", label: "", image_asset_id: null },
  action_cc: { type: "action_cc", midi_channel: 1, cc_number: 20,
    off_color: "#303030", on_color: "#FF6600", label: "", image_asset_id: null },
  program_change: { type: "program_change", midi_channel: 1, program_number: 0,
    off_color: "#303030", on_color: "#3399FF", label: "", image_asset_id: null },
  expression_pedal: { type: "expression_pedal", midi_channel: 1, cc_number: 7,
    off_color: "#303030", on_color: "#FFCC00", value_min: 0, value_max: 127,
    reverse: false, has_home: false, home_value: 0, label: "", image_asset_id: null },
  nothing: { type: "nothing", label: "", color: "#1A1A1A" },
};
// [key, label, kind]; kind: chan | midi7 | pc | color | bool
const FIELDS = {
  effect_cc: [
    ["midi_channel", "MIDI channel", "chan"], ["cc_number", "Note number", "midi7"],
    ["off_color", "Off color", "color"], ["on_color", "On color", "color"],
  ],
  action_cc: [
    ["midi_channel", "MIDI channel", "chan"], ["cc_number", "Note number", "midi7"],
    ["off_color", "Off color", "color"], ["on_color", "On color", "color"],
  ],
  program_change: [
    ["midi_channel", "MIDI channel", "chan"], ["program_number", "Program number", "pc"],
    ["off_color", "Off color", "color"], ["on_color", "On color", "color"],
  ],
  expression_pedal: [
    ["midi_channel", "MIDI channel", "chan"], ["cc_number", "CC number", "midi7"],
    ["off_color", "Off color", "color"], ["on_color", "On color", "color"],
    ["value_min", "Value min", "midi7"], ["value_max", "Value max", "midi7"],
    ["reverse", "Reverse direction", "bool"],
    ["has_home", "Return to home value", "bool"], ["home_value", "Home value", "midi7"],
  ],
  nothing: [["color", "Color", "color"]],
};

let config = null;
let currentTab = "overview"; // "overview" | "global" | menu id (number)
let currentMenu = 1;
let selected = new Set(); // multi-edit selection (button numbers, current menu)
let edits = {};           // n -> {primary, secondary} working copies

const $ = id => document.getElementById(id);
const statusEl = $("status");
let statusTimer = null;
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
  clearTimeout(statusTimer);
  if (cls === "ok") statusTimer = setTimeout(() => { statusEl.textContent = ""; }, 2000);
}

async function api(path, payload) {
  const res = await fetch(path, payload === undefined ? {} : {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function menuById(id) { return config.menus.find(m => m.id === id); }
function slotOf(menuId, n) { return (menuById(menuId).slots || {})[String(n)] || null; }
function actionMeta(a) {
  if (!a) return "unassigned";
  switch (a.type) {
    case "effect_cc": case "action_cc": return `${TYPE_NAMES[a.type]} · note ${a.cc_number} · ch ${a.midi_channel}`;
    case "program_change": return `Program Change · PC ${a.program_number} · ch ${a.midi_channel}`;
    case "expression_pedal": return `Expression · CC ${a.cc_number} · ch ${a.midi_channel}`;
    default: return "Nothing";
  }
}

/* ---------- tabs ---------- */

const TABS = [
  ["overview", "Overview"], [1, "Menu 1"], [2, "Menu 2"], [3, "Menu 3"], [4, "Menu 4"],
  ["global", "Global Settings"],
];

function renderTabs() {
  const nav = $("tabs");
  nav.innerHTML = "";
  for (const [id, name] of TABS) {
    const b = document.createElement("button");
    b.textContent = typeof id === "number" ? (menuById(id).name || name) : name;
    b.className = id === currentTab ? "active" : "";
    b.onclick = () => switchTab(id);
    nav.appendChild(b);
  }
}

function switchTab(id, keepSelection) {
  currentTab = id;
  if (typeof id === "number" && currentMenu !== id) {
    currentMenu = id;
    if (!keepSelection) selected.clear();
  }
  $("view-overview").hidden = id !== "overview";
  $("view-menu").hidden = typeof id !== "number";
  $("view-global").hidden = id !== "global";
  renderTabs();
  if (id === "overview") renderOverview();
  if (typeof id === "number") renderCards();
}

/* ---------- overview: all 36 slots ---------- */

function renderOverview() {
  const view = $("view-overview");
  view.innerHTML = "";
  const hint = document.createElement("div");
  hint.className = "hint";
  hint.textContent = "All four menus. Swatches: primary on · secondary on · off. Click a panel to edit it.";
  view.appendChild(hint);
  for (const menu of config.menus) {
    const section = document.createElement("div");
    section.className = "ov-menu";
    const h2 = document.createElement("h2");
    h2.textContent = menu.name || `Menu ${menu.id}`;
    section.appendChild(h2);
    const grid = document.createElement("div");
    grid.className = "ov-grid";
    for (let n = 1; n <= 10; n++) {
      grid.appendChild(n === 10 ? shiftCell() : overviewCell(menu.id, n));
    }
    section.appendChild(grid);
    view.appendChild(section);
  }
}

function shiftCell() {
  const cell = document.createElement("div");
  cell.className = "cell shift";
  cell.textContent = "B10 · Shift / Menu";
  return cell;
}

function overviewCell(menuId, n) {
  const cell = document.createElement("div");
  cell.className = "cell";
  const slot = slotOf(menuId, n);
  const a = slot && slot.primary;
  const sec = slot && slot.secondary && slot.secondary.enabled ? slot.secondary : null;

  // Swatches in fixed order: primary on, secondary on, off.
  const swatches = [];
  if (a && a.type !== "nothing") swatches.push([a.on_color, "primary on"]);
  else if (a) swatches.push([a.color, "color"]);
  if (sec) swatches.push([sec.action.on_color, "secondary on"]);
  if (a && a.off_color) swatches.push([a.off_color, "off"]);

  cell.innerHTML = `
    <div class="head"><span class="num">B${n}</span><span class="swatches"></span></div>
    <div class="label"></div>
    <div class="meta"></div>
    <div class="hold"></div>`;
  const box = cell.querySelector(".swatches");
  for (const [color, title] of swatches) {
    const sw = document.createElement("span");
    sw.className = "sw";
    sw.style.background = color || "#0f0f0f";
    sw.title = title;
    box.appendChild(sw);
  }
  cell.querySelector(".label").textContent = (a && a.label) || (a ? "" : "—");
  cell.querySelector(".meta").textContent = actionMeta(a);
  cell.querySelector(".hold").textContent =
    sec ? `Hold ${sec.hold_seconds}s for ${sec.action.label || TYPE_NAMES[sec.action.type]}` : "";
  cell.onclick = () => {
    currentMenu = menuId;
    selected = new Set([n]);
    switchTab(menuId, true);
    const card = $("card-" + n);
    if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
  };
  return cell;
}

/* ---------- menu tab: in-depth cards in the physical 5x2 layout ---------- */

function buildEdits() {
  edits = {};
  for (let n = 1; n <= 9; n++) {
    const slot = slotOf(currentMenu, n) || {};
    edits[n] = {
      primary: structuredClone(slot.primary || TEMPLATES.nothing),
      secondary: slot.secondary && slot.secondary.enabled
        ? structuredClone(slot.secondary) : null,
    };
  }
}

function renderCards() {
  buildEdits();
  const wrap = $("cards");
  wrap.innerHTML = "";
  for (let n = 1; n <= 10; n++) {
    if (n === 10) {
      const card = document.createElement("div");
      card.className = "card shift";
      card.textContent = "B10 · Shift / Menu";
      wrap.appendChild(card);
    } else {
      wrap.appendChild(buildCard(n));
    }
  }
  refreshSelection();
}

function refreshSelection() {
  for (let n = 1; n <= 9; n++) {
    const card = $("card-" + n);
    if (card) card.classList.toggle("selected", selected.has(n));
  }
}

function rebuildCard(n) {
  const old = $("card-" + n);
  if (old) old.replaceWith(buildCard(n));
  refreshSelection();
}

function buildCard(n) {
  const card = document.createElement("div");
  card.className = "card";
  card.id = "card-" + n;
  const edit = edits[n];

  // Click anywhere that isn't a control to (shift-)select this button.
  card.onclick = e => {
    if (e.target.closest("input, select, button, label, option")) return;
    if (e.shiftKey) selected.has(n) ? selected.delete(n) : selected.add(n);
    else selected = selected.has(n) && selected.size === 1 ? new Set() : new Set([n]);
    refreshSelection();
  };

  const title = document.createElement("h3");
  title.innerHTML = `B${n}${edit.secondary ? '<span class="sec-tag">has secondary</span>' : ""}`;
  card.appendChild(title);

  card.appendChild(actionForm(n, "primary"));

  const divider = document.createElement("div");
  divider.className = "divider";
  card.appendChild(divider);

  const h4 = document.createElement("h4");
  h4.textContent = "Secondary (hold)";
  card.appendChild(h4);

  if (edit.secondary === null) {
    const add = document.createElement("button");
    add.className = "btn";
    add.textContent = "Add secondary action";
    add.onclick = () => mirrored(n, t => {
      if (edits[t].secondary === null) {
        edits[t].secondary = {
          enabled: true,
          hold_seconds: config.buttons.secondary_hold_default_seconds,
          action: newAction("effect_cc", true),
        };
      }
      saveSecondary(t);
      rebuildCard(t);
    });
    card.appendChild(add);
  } else {
    const hold = document.createElement("input");
    hold.type = "number"; hold.min = 0.2; hold.max = 10; hold.step = 0.1;
    hold.value = edit.secondary.hold_seconds;
    hold.onchange = () => {
      const v = parseFloat(hold.value);
      if (isNaN(v)) return;
      mirrored(n, t => {
        if (edits[t].secondary) { edits[t].secondary.hold_seconds = v; saveSecondary(t); }
      });
    };
    card.appendChild(field("Hold duration (seconds)", hold));
    card.appendChild(actionForm(n, "secondary"));
    const remove = document.createElement("button");
    remove.className = "btn danger";
    remove.textContent = "Remove secondary action";
    remove.onclick = () => mirrored(n, t => {
      if (edits[t].secondary !== null) {
        edits[t].secondary = null;
        removeSecondary(t);
        rebuildCard(t);
      }
    });
    card.appendChild(remove);
  }
  return card;
}

function field(labelText, input) {
  const div = document.createElement("div");
  div.className = "field";
  const label = document.createElement("label");
  label.textContent = labelText;
  div.append(label, input);
  return div;
}

function newAction(type, isSecondary) {
  const a = structuredClone(TEMPLATES[type]);
  if (type === "program_change") a.program_number = config.midi.program_display_base;
  if (isSecondary) { delete a.off_color; delete a.image_asset_id; }
  return a;
}

function getAction(n, role) {
  return role === "primary" ? edits[n].primary
       : edits[n].secondary && edits[n].secondary.action;
}

// Run fn for this button and every other selected one (multi-edit).
function mirrored(n, fn) {
  const targets = selected.has(n) && selected.size > 1 ? [...selected] : [n];
  for (const t of targets) fn(t);
}

function setField(n, role, key, value, structural) {
  mirrored(n, t => {
    const action = getAction(t, role);
    if (!action) return;
    // Labels are per-button even in multi-edit; skip mirroring them.
    if (key === "label" && t !== n) return;
    if (key === "type") {
      if (action.type === value) return;
      const fresh = newAction(value, role === "secondary");
      fresh.label = action.label || "";
      if (action.midi_channel && value !== "nothing") fresh.midi_channel = action.midi_channel;
      if (role === "primary") edits[t].primary = fresh;
      else edits[t].secondary.action = fresh;
    } else {
      action[key] = value;
    }
    role === "primary" ? savePrimary(t) : saveSecondary(t);
    if (structural) rebuildCard(t);
  });
}

function actionForm(n, role) {
  const action = getAction(n, role);
  const wrap = document.createElement("div");
  const types = role === "primary" ? PRIMARY_TYPES : SECONDARY_TYPES;

  const typeSel = document.createElement("select");
  for (const t of types) {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = TYPE_NAMES[t];
    typeSel.appendChild(opt);
  }
  typeSel.value = action.type;
  typeSel.onchange = () => setField(n, role, "type", typeSel.value, true);
  wrap.appendChild(field("Action type", typeSel));

  const label = document.createElement("input");
  label.type = "text"; label.maxLength = 24; label.value = action.label || "";
  label.onchange = () => setField(n, role, "label", label.value);
  wrap.appendChild(field("Label", label));

  const pairs = document.createElement("div");
  pairs.className = "row2";
  for (const [key, name, kind] of FIELDS[action.type]) {
    if (role === "secondary" && key === "off_color") continue;
    if (kind === "bool") {
      const div = document.createElement("div");
      div.className = "check";
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = !!action[key];
      cb.id = `cb-${n}-${role}-${key}`;
      cb.onchange = () => setField(n, role, key, cb.checked);
      const lb = document.createElement("label");
      lb.htmlFor = cb.id; lb.textContent = name;
      div.append(cb, lb);
      wrap.appendChild(div);
      continue;
    }
    const input = document.createElement("input");
    if (kind === "color") {
      input.type = "color"; input.value = action[key];
      input.onchange = () => setField(n, role, key, input.value.toUpperCase());
    } else {
      const base = config.midi.program_display_base;
      input.type = "number";
      input.min = kind === "chan" ? 1 : kind === "pc" ? base : 0;
      input.max = kind === "chan" ? 16 : kind === "pc" ? 127 + base : 127;
      input.value = action[key];
      input.onchange = () => {
        const v = parseInt(input.value, 10);
        if (!isNaN(v)) setField(n, role, key, v);
      };
    }
    pairs.appendChild(field(name, input));
  }
  wrap.appendChild(pairs);
  return wrap;
}

/* ---------- saving ---------- */

function applySavedSlot(n, slot) {
  menuById(currentMenu).slots = menuById(currentMenu).slots || {};
  menuById(currentMenu).slots[String(n)] = slot;
  const card = $("card-" + n);
  if (card) {
    const tag = card.querySelector(".sec-tag");
    const has = slot.secondary && slot.secondary.enabled;
    if (has && !tag) {
      const span = document.createElement("span");
      span.className = "sec-tag";
      span.textContent = "has secondary";
      card.querySelector("h3").appendChild(span);
    } else if (!has && tag) tag.remove();
  }
}

async function post(n, path, payload) {
  setStatus("saving…");
  try {
    const data = await api(path, payload);
    applySavedSlot(n, data.slot);
    setStatus("saved", "ok");
  } catch (err) {
    setStatus(`B${n} save failed: ` + err.message, "err");
  }
}

function savePrimary(n) {
  post(n, "/api/slot/primary",
    { menu_id: currentMenu, button_num: n, action: edits[n].primary });
}
function saveSecondary(n) {
  const sec = edits[n].secondary;
  if (!sec) return;
  post(n, "/api/slot/secondary", {
    menu_id: currentMenu, button_num: n,
    hold_seconds: sec.hold_seconds, action: sec.action,
  });
}
function removeSecondary(n) {
  post(n, "/api/slot/secondary/remove", { menu_id: currentMenu, button_num: n });
}

/* ---------- global settings tab ---------- */

function initSettings() {
  $("set-shift").value = config.buttons.shift_hold_seconds;
  $("set-hold").value = config.buttons.secondary_hold_default_seconds;
  $("set-pcbase").value = config.midi.program_display_base;
  const width = Math.round(config.ui.expression_panel_width_ratio * 100);
  $("set-width").value = width;
  $("set-width-val").textContent = width;

  $("set-shift").onchange = () => saveSettings({ shift_hold_seconds: parseFloat($("set-shift").value) });
  $("set-hold").onchange = () => saveSettings({ secondary_hold_default_seconds: parseFloat($("set-hold").value) });
  $("set-width").oninput = () => { $("set-width-val").textContent = $("set-width").value; };
  $("set-width").onchange = () =>
    saveSettings({ expression_panel_width_ratio: parseInt($("set-width").value, 10) / 100 });
  // Changing the base re-numbers every stored program server-side, so pull
  // the whole config back down and re-render.
  $("set-pcbase").onchange = async () => {
    await saveSettings({ program_display_base: parseInt($("set-pcbase").value, 10) });
    config = await api("/api/config");
    switchTab(currentTab, true);
  };
}

async function saveSettings(payload) {
  setStatus("saving…");
  try {
    const data = await api("/api/settings", payload);
    for (const [key, value] of Object.entries(data.settings)) {
      if (key === "expression_panel_width_ratio") config.ui[key] = value;
      else if (key === "program_display_base") config.midi[key] = value;
      else config.buttons[key] = value;
    }
    setStatus("saved", "ok");
  } catch (err) {
    setStatus("save failed: " + err.message, "err");
  }
}

/* ---------- live status ---------- */

function describeMode(mode) {
  if (!mode) return "none";
  const [menuId, n, role] = mode;
  const slot = slotOf(menuId, n);
  const action = slot && (role === "secondary"
    ? slot.secondary && slot.secondary.action : slot.primary);
  const name = (action && action.label) || `B${n}`;
  return `${name} (Menu ${menuId} · B${n}${role === "secondary" ? " hold" : ""})`;
}

async function pollStatus() {
  try {
    const s = await api("/api/status");
    $("statusbox").innerHTML = `
      <div>Menu: <b>${s.current_menu}</b> &nbsp; Program: <b>${s.current_program === null
        ? "—" : s.current_program + config.midi.program_display_base}</b></div>
      <div>Pedal: <b>${s.expression_detected ? "detected" : "not detected"}</b></div>
      <div>Mode: <b></b></div>
      <div class="expbar"><div style="width:${Math.round(s.expression_value * 100)}%"></div></div>`;
    $("statusbox").querySelectorAll("b")[2].textContent = describeMode(s.expression_mode);
  } catch (err) {
    $("statusbox").textContent = "status unavailable";
  }
}

/* ---------- boot ---------- */

async function load() {
  try {
    config = await api("/api/config");
    initSettings();
    switchTab("overview");
    pollStatus();
    setInterval(pollStatus, 2000);
  } catch (err) {
    setStatus("failed to load config: " + err.message, "err");
  }
}
load();
</script>
