<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIDI Foot Controller</title>
<style>
  :root {
    --bg: #0a0a0a; --panel: #161616; --panel2: #1f1f1f; --border: #2c2c2c;
    --text: #f2f2f2; --dim: #8a8a8a; --accent: #00cc88; --err: #ff5566;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header {
    display: flex; align-items: baseline; gap: 12px;
    padding: 16px 24px 0;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 13px; }
  #status { margin-left: auto; font-size: 13px; color: var(--dim); transition: color .2s; }
  #status.ok { color: var(--accent); }
  #status.err { color: var(--err); }
  nav { display: flex; gap: 6px; padding: 14px 24px 0; }
  nav button {
    background: var(--panel); color: var(--dim); border: 1px solid var(--border);
    border-bottom: none; border-radius: 8px 8px 0 0; padding: 9px 22px;
    font-size: 14px; cursor: pointer;
  }
  nav button.active { background: var(--panel2); color: var(--text); font-weight: 600; }
  main {
    margin: 0 24px 24px; padding: 16px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 0 8px 8px 8px;
  }
  .grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
  }
  .cell {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px;
  }
  .cell .head { display: flex; align-items: center; gap: 8px; }
  .cell .num { font-size: 12px; color: var(--dim); font-weight: 600; }
  .cell .swatch {
    width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--border);
    margin-left: auto;
  }
  .cell input, .cell select {
    width: 100%; background: #0f0f0f; color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 7px 9px;
    font-size: 14px;
  }
  .cell input:focus, .cell select:focus { outline: 1px solid var(--accent); }
  .cell .meta { font-size: 12px; color: var(--dim); min-height: 16px; }
  .cell.shift {
    justify-content: center; align-items: center; color: var(--dim);
    border-style: dashed;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<header>
  <h1>MIDI Foot Controller</h1>
  <span class="sub">configuration</span>
  <span id="status"></span>
</header>
<nav id="tabs"></nav>
<main><div class="grid" id="grid"></div></main>
<script>
const TYPES = [
  ["effect_cc", "Effect CC"],
  ["action_cc", "Action CC"],
  ["program_change", "Program Change"],
  ["expression_pedal", "Expression Pedal"],
  ["nothing", "Nothing"],
];
let config = null;
let currentMenu = 1;

const statusEl = document.getElementById("status");
let statusTimer = null;
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
  clearTimeout(statusTimer);
  if (cls === "ok") statusTimer = setTimeout(() => { statusEl.textContent = ""; }, 2000);
}

function menuById(id) { return config.menus.find(m => m.id === id); }
function slotOf(menuId, n) { return (menuById(menuId).slots || {})[String(n)] || null; }

function actionMeta(a) {
  if (!a) return "unassigned";
  switch (a.type) {
    case "effect_cc":
    case "action_cc": return `Note ${a.cc_number} · ch ${a.midi_channel}`;
    case "program_change": return `PC ${a.program_number} · ch ${a.midi_channel}`;
    case "expression_pedal": return `CC ${a.cc_number} · ch ${a.midi_channel}`;
    default: return "no MIDI";
  }
}
function actionColor(a) {
  if (!a) return "#0f0f0f";
  return a.on_color || a.pressed_color || a.active_color || a.color || "#0f0f0f";
}

function renderTabs() {
  const nav = document.getElementById("tabs");
  nav.innerHTML = "";
  for (const menu of config.menus) {
    const b = document.createElement("button");
    b.textContent = menu.name || `Menu ${menu.id}`;
    b.className = menu.id === currentMenu ? "active" : "";
    b.onclick = () => { currentMenu = menu.id; render(); };
    nav.appendChild(b);
  }
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (let n = 1; n <= 10; n++) {
    const cell = document.createElement("div");
    if (n === 10) {
      cell.className = "cell shift";
      cell.textContent = "B10 · Shift / Menu";
      grid.appendChild(cell);
      continue;
    }
    cell.className = "cell";
    const slot = slotOf(currentMenu, n);
    const action = slot && slot.primary;

    const head = document.createElement("div");
    head.className = "head";
    head.innerHTML = `<span class="num">B${n}</span><span class="swatch"></span>`;
    head.querySelector(".swatch").style.background = actionColor(action);

    const label = document.createElement("input");
    label.placeholder = "Label";
    label.maxLength = 24;
    label.value = (action && action.label) || "";

    const select = document.createElement("select");
    for (const [value, name] of TYPES) {
      const opt = document.createElement("option");
      opt.value = value;
      opt.textContent = name;
      select.appendChild(opt);
    }
    select.value = action ? action.type : "nothing";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = actionMeta(action);

    const save = () => saveSlot(currentMenu, n, select.value, label.value);
    select.onchange = save;
    label.onchange = save;

    cell.append(head, label, select, meta);
    grid.appendChild(cell);
  }
}

function render() { renderTabs(); renderGrid(); }

async function saveSlot(menuId, buttonNum, type, label) {
  setStatus("saving…");
  try {
    const res = await fetch("/api/slot", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ menu_id: menuId, button_num: buttonNum, type, label }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    menuById(menuId).slots = menuById(menuId).slots || {};
    menuById(menuId).slots[String(buttonNum)] = data.slot;
    setStatus("saved", "ok");
    if (menuId === currentMenu) renderGrid();
  } catch (err) {
    setStatus("save failed: " + err.message, "err");
  }
}

async function load() {
  try {
    config = await (await fetch("/api/config")).json();
    render();
  } catch (err) {
    setStatus("failed to load config: " + err.message, "err");
  }
}
load();
</script>
</body>
</html>
