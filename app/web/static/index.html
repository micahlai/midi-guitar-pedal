<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIDI Foot Controller</title>
<style>
  :root {
    --bg: #0a0a0a; --panel: #161616; --panel2: #1f1f1f; --border: #2c2c2c;
    --text: #f2f2f2; --dim: #8a8a8a; --accent: #00cc88; --err: #ff5566;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  header { display: flex; align-items: baseline; gap: 12px; padding: 16px 24px 0; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 13px; }
  #status { margin-left: auto; font-size: 13px; color: var(--dim); transition: color .2s; }
  #status.ok { color: var(--accent); }
  #status.err { color: var(--err); }
  nav { display: flex; gap: 6px; padding: 14px 24px 0; }
  nav button {
    background: var(--panel); color: var(--dim); border: 1px solid var(--border);
    border-bottom: none; border-radius: 8px 8px 0 0; padding: 9px 22px;
    font-size: 14px; cursor: pointer;
  }
  nav button.active { background: var(--panel2); color: var(--text); font-weight: 600; }
  .layout { display: flex; gap: 16px; margin: 0 24px 24px; align-items: flex-start; }
  main {
    flex: 1; padding: 16px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 0 8px 8px 8px;
  }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .cell {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 4px;
    cursor: pointer; min-height: 96px;
  }
  .cell:hover { border-color: var(--accent); }
  .cell .head { display: flex; align-items: center; gap: 8px; }
  .cell .num { font-size: 12px; color: var(--dim); font-weight: 600; }
  .cell .swatch {
    width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--border);
    margin-left: auto;
  }
  .cell .label { font-size: 16px; font-weight: 600; min-height: 22px; }
  .cell .meta { font-size: 12px; color: var(--dim); }
  .cell .hold { font-size: 12px; color: var(--dim); font-style: italic; }
  .cell.shift {
    justify-content: center; align-items: center; color: var(--dim);
    border-style: dashed; cursor: default;
  }
  aside {
    width: 300px; background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 18px;
  }
  aside h2 { font-size: 13px; margin: 0; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field label { font-size: 12px; color: var(--dim); }
  .field input[type=text], .field input[type=number], .field select {
    background: #0f0f0f; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 9px; font-size: 14px; width: 100%;
  }
  .field input[type=color] { width: 100%; height: 34px; padding: 2px; background: #0f0f0f;
    border: 1px solid var(--border); border-radius: 6px; }
  .field input:focus, .field select:focus { outline: 1px solid var(--accent); }
  .check { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  #statusbox { font-size: 13px; color: var(--dim); display: flex; flex-direction: column; gap: 5px; }
  #statusbox b { color: var(--text); font-weight: 600; }
  .expbar { height: 8px; background: #0f0f0f; border-radius: 4px; overflow: hidden; }
  .expbar > div { height: 100%; background: var(--accent); width: 0; transition: width .3s; }
  /* modal */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none;
    align-items: flex-start; justify-content: center; padding: 40px 16px; overflow: auto;
  }
  #overlay.open { display: flex; }
  #modal {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 10px;
    width: 460px; max-width: 100%; padding: 18px 20px 20px;
  }
  #modal h2 { margin: 0 0 12px; font-size: 16px; }
  .modaltabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .modaltabs button {
    background: var(--panel); color: var(--dim); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 18px; font-size: 14px; cursor: pointer;
  }
  .modaltabs button.active { color: var(--text); border-color: var(--accent); }
  .btn {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer;
  }
  .btn.primary { background: var(--accent); color: #04120c; border-color: var(--accent); font-weight: 600; }
  .btn.danger { color: var(--err); border-color: var(--err); }
  .modalfoot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .modalfoot .danger { margin-right: auto; }
  @media (max-width: 1000px) { .layout { flex-direction: column; } aside { width: 100%; } }
</style>
</head>
<body>
<header>
  <h1>MIDI Foot Controller</h1>
  <span class="sub">configuration</span>
  <span id="status"></span>
</header>
<nav id="tabs"></nav>
<div class="layout">
  <main><div class="grid" id="grid"></div></main>
  <aside>
    <div>
      <h2>Hold Settings</h2>
      <div class="field">
        <label>Shift hold — Menu 4 (seconds)</label>
        <input type="number" id="set-shift" min="0.5" max="10" step="0.1">
      </div>
      <div class="field">
        <label>Default secondary hold (seconds)</label>
        <input type="number" id="set-hold" min="0.2" max="10" step="0.1">
      </div>
    </div>
    <div>
      <h2>Expression Panel</h2>
      <div class="field">
        <label>Panel width: <span id="set-width-val"></span>% of screen</label>
        <input type="range" id="set-width" min="5" max="30" step="1">
      </div>
    </div>
    <div>
      <h2>Live Status</h2>
      <div id="statusbox">connecting…</div>
    </div>
  </aside>
</div>

<div id="overlay">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <div class="modaltabs" id="modal-tabs"></div>
    <div id="modal-form"></div>
    <div class="modalfoot" id="modal-foot"></div>
  </div>
</div>

<script>
const TYPE_NAMES = {
  effect_cc: "Effect CC", action_cc: "Action CC", program_change: "Program Change",
  expression_pedal: "Expression Pedal", nothing: "Nothing",
};
const PRIMARY_TYPES = ["effect_cc", "action_cc", "program_change", "expression_pedal", "nothing"];
const SECONDARY_TYPES = ["effect_cc", "action_cc", "program_change"];
const TEMPLATES = {
  effect_cc: { type: "effect_cc", midi_channel: 1, cc_number: 20,
    off_color: "#303030", on_color: "#00FF66", label: "", image_asset_id: null },
  action_cc: { type: "action_cc", midi_channel: 1, cc_number: 20,
    default_color: "#303030", pressed_color: "#FF6600", label: "", image_asset_id: null },
  program_change: { type: "program_change", midi_channel: 1, program_number: 0,
    inactive_color: "#303030", active_color: "#3399FF", label: "", image_asset_id: null },
  expression_pedal: { type: "expression_pedal", midi_channel: 1, cc_number: 7,
    color: "#FFCC00", value_min: 0, value_max: 127, reverse: false,
    has_home: false, home_value: 0, label: "", image_asset_id: null },
  nothing: { type: "nothing", label: "", color: "#1A1A1A" },
};
// [key, label, kind]; kind: chan | midi7 | color | bool
const FIELDS = {
  effect_cc: [
    ["midi_channel", "MIDI channel", "chan"], ["cc_number", "Note number", "midi7"],
    ["off_color", "Off color", "color"], ["on_color", "On color", "color"],
  ],
  action_cc: [
    ["midi_channel", "MIDI channel", "chan"], ["cc_number", "Note number", "midi7"],
    ["default_color", "Default color", "color"], ["pressed_color", "Pressed color", "color"],
  ],
  program_change: [
    ["midi_channel", "MIDI channel", "chan"], ["program_number", "Program number", "midi7"],
    ["inactive_color", "Inactive color", "color"], ["active_color", "Active color", "color"],
  ],
  expression_pedal: [
    ["midi_channel", "MIDI channel", "chan"], ["cc_number", "CC number", "midi7"],
    ["color", "Color", "color"],
    ["value_min", "Value min", "midi7"], ["value_max", "Value max", "midi7"],
    ["reverse", "Reverse direction", "bool"],
    ["has_home", "Return to home value", "bool"], ["home_value", "Home value", "midi7"],
  ],
  nothing: [["color", "Color", "color"]],
};

let config = null;
let currentMenu = 1;
let edit = null; // {menuId, n, tab, primary, secondary, hadSecondary}

const $ = id => document.getElementById(id);
const statusEl = $("status");
let statusTimer = null;
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
  clearTimeout(statusTimer);
  if (cls === "ok") statusTimer = setTimeout(() => { statusEl.textContent = ""; }, 2000);
}

async function api(path, payload) {
  const res = await fetch(path, payload === undefined ? {} : {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function menuById(id) { return config.menus.find(m => m.id === id); }
function slotOf(menuId, n) { return (menuById(menuId).slots || {})[String(n)] || null; }
function actionMeta(a) {
  if (!a) return "unassigned";
  switch (a.type) {
    case "effect_cc": case "action_cc": return `${TYPE_NAMES[a.type]} · note ${a.cc_number} · ch ${a.midi_channel}`;
    case "program_change": return `Program Change · PC ${a.program_number} · ch ${a.midi_channel}`;
    case "expression_pedal": return `Expression · CC ${a.cc_number} · ch ${a.midi_channel}`;
    default: return "Nothing";
  }
}
function actionColor(a) {
  if (!a) return "#0f0f0f";
  return a.on_color || a.pressed_color || a.active_color || a.color || "#0f0f0f";
}

/* ---------- grid ---------- */

function renderTabs() {
  const nav = $("tabs");
  nav.innerHTML = "";
  for (const menu of config.menus) {
    const b = document.createElement("button");
    b.textContent = menu.name || `Menu ${menu.id}`;
    b.className = menu.id === currentMenu ? "active" : "";
    b.onclick = () => { currentMenu = menu.id; render(); };
    nav.appendChild(b);
  }
}

function renderGrid() {
  const grid = $("grid");
  grid.innerHTML = "";
  for (let n = 1; n <= 10; n++) {
    const cell = document.createElement("div");
    if (n === 10) {
      cell.className = "cell shift";
      cell.textContent = "B10 · Shift / Menu";
      grid.appendChild(cell);
      continue;
    }
    cell.className = "cell";
    const slot = slotOf(currentMenu, n);
    const a = slot && slot.primary;
    const sec = slot && slot.secondary && slot.secondary.enabled ? slot.secondary : null;
    cell.innerHTML = `
      <div class="head"><span class="num">B${n}</span><span class="swatch"></span></div>
      <div class="label"></div>
      <div class="meta"></div>
      <div class="hold"></div>`;
    cell.querySelector(".swatch").style.background = actionColor(a);
    cell.querySelector(".label").textContent = (a && a.label) || (a ? "" : "—");
    cell.querySelector(".meta").textContent = actionMeta(a);
    cell.querySelector(".hold").textContent =
      sec ? `Hold ${sec.hold_seconds}s for ${sec.action.label || TYPE_NAMES[sec.action.type]}` : "";
    cell.onclick = () => openEditor(currentMenu, n);
    grid.appendChild(cell);
  }
}

function render() { renderTabs(); renderGrid(); }

/* ---------- slot editor modal ---------- */

function openEditor(menuId, n) {
  const slot = slotOf(menuId, n) || {};
  edit = {
    menuId, n, tab: "primary",
    primary: structuredClone(slot.primary || TEMPLATES.nothing),
    secondary: slot.secondary && slot.secondary.enabled ? structuredClone(slot.secondary) : null,
    hadSecondary: !!(slot.secondary && slot.secondary.enabled),
  };
  $("modal-title").textContent = `Menu ${menuId} — Button ${n}`;
  renderModal();
  $("overlay").classList.add("open");
}
function closeEditor() { $("overlay").classList.remove("open"); edit = null; }
$("overlay").onclick = e => { if (e.target === $("overlay")) closeEditor(); };

function field(labelText, input) {
  const div = document.createElement("div");
  div.className = "field";
  const label = document.createElement("label");
  label.textContent = labelText;
  div.append(label, input);
  return div;
}

function actionForm(action, allowedTypes, onTypeChange) {
  const wrap = document.createElement("div");

  const typeSel = document.createElement("select");
  for (const t of allowedTypes) {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = TYPE_NAMES[t];
    typeSel.appendChild(opt);
  }
  typeSel.value = action.type;
  typeSel.onchange = () => onTypeChange(typeSel.value);
  wrap.appendChild(field("Action type", typeSel));

  const label = document.createElement("input");
  label.type = "text"; label.maxLength = 24; label.value = action.label || "";
  label.oninput = () => { action.label = label.value; };
  wrap.appendChild(field("Label", label));

  const pairs = document.createElement("div");
  pairs.className = "row2";
  for (const [key, name, kind] of FIELDS[action.type]) {
    if (kind === "bool") {
      const div = document.createElement("div");
      div.className = "check";
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = !!action[key]; cb.id = "cb-" + key;
      cb.onchange = () => { action[key] = cb.checked; };
      const lb = document.createElement("label");
      lb.htmlFor = cb.id; lb.textContent = name;
      div.append(cb, lb);
      wrap.appendChild(div);
      continue;
    }
    const input = document.createElement("input");
    if (kind === "color") {
      input.type = "color"; input.value = action[key];
      input.oninput = () => { action[key] = input.value.toUpperCase(); };
    } else {
      input.type = "number";
      input.min = kind === "chan" ? 1 : 0;
      input.max = kind === "chan" ? 16 : 127;
      input.value = action[key];
      input.oninput = () => { action[key] = parseInt(input.value, 10); };
    }
    pairs.appendChild(field(name, input));
  }
  wrap.appendChild(pairs);
  return wrap;
}

function switchType(action, newType, allowImage) {
  const fresh = structuredClone(TEMPLATES[newType]);
  fresh.label = action.label || "";
  fresh.midi_channel = action.midi_channel || fresh.midi_channel;
  if (!allowImage) delete fresh.image_asset_id;
  return fresh;
}

function renderModal() {
  const tabs = $("modal-tabs");
  tabs.innerHTML = "";
  for (const t of ["primary", "secondary"]) {
    const b = document.createElement("button");
    b.textContent = t === "primary" ? "Primary" : "Secondary";
    b.className = edit.tab === t ? "active" : "";
    b.onclick = () => { edit.tab = t; renderModal(); };
    tabs.appendChild(b);
  }

  const form = $("modal-form");
  form.innerHTML = "";
  const foot = $("modal-foot");
  foot.innerHTML = "";

  if (edit.tab === "primary") {
    form.appendChild(actionForm(edit.primary, PRIMARY_TYPES, t => {
      edit.primary = switchType(edit.primary, t, true);
      renderModal();
    }));
  } else if (edit.secondary === null) {
    const add = document.createElement("button");
    add.className = "btn";
    add.textContent = "Add secondary action";
    add.onclick = () => {
      edit.secondary = {
        enabled: true,
        hold_seconds: config.buttons.secondary_hold_default_seconds,
        action: switchType({}, "effect_cc", false),
      };
      renderModal();
    };
    form.appendChild(add);
  } else {
    const hold = document.createElement("input");
    hold.type = "number"; hold.min = 0.2; hold.max = 10; hold.step = 0.1;
    hold.value = edit.secondary.hold_seconds;
    hold.oninput = () => { edit.secondary.hold_seconds = parseFloat(hold.value); };
    form.appendChild(field("Hold duration (seconds)", hold));
    form.appendChild(actionForm(edit.secondary.action, SECONDARY_TYPES, t => {
      edit.secondary.action = switchType(edit.secondary.action, t, false);
      renderModal();
    }));
    const remove = document.createElement("button");
    remove.className = "btn danger";
    remove.textContent = "Remove secondary action";
    remove.onclick = () => { edit.secondary = null; renderModal(); };
    foot.appendChild(remove);
  }

  const cancel = document.createElement("button");
  cancel.className = "btn"; cancel.textContent = "Cancel"; cancel.onclick = closeEditor;
  const save = document.createElement("button");
  save.className = "btn primary"; save.textContent = "Save"; save.onclick = saveEditor;
  foot.append(cancel, save);
}

async function saveEditor() {
  const { menuId, n } = edit;
  setStatus("saving…");
  try {
    let data = await api("/api/slot/primary",
      { menu_id: menuId, button_num: n, action: edit.primary });
    if (edit.secondary !== null) {
      data = await api("/api/slot/secondary", {
        menu_id: menuId, button_num: n,
        hold_seconds: edit.secondary.hold_seconds, action: edit.secondary.action,
      });
    } else if (edit.hadSecondary) {
      data = await api("/api/slot/secondary/remove", { menu_id: menuId, button_num: n });
    }
    menuById(menuId).slots = menuById(menuId).slots || {};
    menuById(menuId).slots[String(n)] = data.slot;
    setStatus("saved", "ok");
    closeEditor();
    render();
  } catch (err) {
    setStatus("save failed: " + err.message, "err");
  }
}

/* ---------- sidebar settings ---------- */

function initSettings() {
  $("set-shift").value = config.buttons.shift_hold_seconds;
  $("set-hold").value = config.buttons.secondary_hold_default_seconds;
  const width = Math.round(config.ui.expression_panel_width_ratio * 100);
  $("set-width").value = width;
  $("set-width-val").textContent = width;

  $("set-shift").onchange = () => saveSettings({ shift_hold_seconds: parseFloat($("set-shift").value) });
  $("set-hold").onchange = () => saveSettings({ secondary_hold_default_seconds: parseFloat($("set-hold").value) });
  $("set-width").oninput = () => { $("set-width-val").textContent = $("set-width").value; };
  $("set-width").onchange = () =>
    saveSettings({ expression_panel_width_ratio: parseInt($("set-width").value, 10) / 100 });
}

async function saveSettings(payload) {
  setStatus("saving…");
  try {
    const data = await api("/api/settings", payload);
    Object.assign(config.buttons, data.settings);
    if ("expression_panel_width_ratio" in data.settings)
      config.ui.expression_panel_width_ratio = data.settings.expression_panel_width_ratio;
    setStatus("saved", "ok");
  } catch (err) {
    setStatus("save failed: " + err.message, "err");
  }
}

/* ---------- live status ---------- */

function describeMode(mode) {
  if (!mode) return "none";
  const [menuId, n, role] = mode;
  const slot = slotOf(menuId, n);
  const action = slot && (role === "secondary"
    ? slot.secondary && slot.secondary.action : slot.primary);
  const name = (action && action.label) || `B${n}`;
  return `${name} (Menu ${menuId} · B${n}${role === "secondary" ? " hold" : ""})`;
}

async function pollStatus() {
  try {
    const s = await api("/api/status");
    $("statusbox").innerHTML = `
      <div>Menu: <b>${s.current_menu}</b> &nbsp; Program: <b>${s.current_program ?? "—"}</b></div>
      <div>Pedal: <b>${s.expression_detected ? "detected" : "not detected"}</b></div>
      <div>Mode: <b></b></div>
      <div class="expbar"><div style="width:${Math.round(s.expression_value * 100)}%"></div></div>`;
    $("statusbox").querySelectorAll("b")[2].textContent = describeMode(s.expression_mode);
  } catch (err) {
    $("statusbox").textContent = "status unavailable";
  }
}

/* ---------- boot ---------- */

async function load() {
  try {
    config = await api("/api/config");
    render();
    initSettings();
    pollStatus();
    setInterval(pollStatus, 2000);
  } catch (err) {
    setStatus("failed to load config: " + err.message, "err");
  }
}
load();
</script>
</body>
</html>
